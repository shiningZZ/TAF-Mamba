# general settings for RealDN training
name: TAFMamba_womapfft_improve_multi_FDC4_HG
model_type: MedicalModel
# model_type: 2
scale: 1
num_gpu: 1  # set num_gpu: 0 for cpu mode
manual_seed: 100
# distortion: sr
# scale: 1
model: mamba_medical_FDC

# dataset and data loader settings
datasets:
  train:
    name: TrainSet
    type: Dataset_MedicalImageMultiseg
    dataroot: /root/autodl-tmp/data/BraTS2023/train
    geometric_augs: true

    filename_tmpl: '{}'
    io_backend:
      type: disk

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 0
    batch_size_per_gpu: 2

    ## -------------Progressive training--------------------------
    mini_batch_sizes: [8,4,2,2,1,1]             # Batch size per gpu
    iters: [25000,15000,10000,10000,7500,7500]
    
    gt_size: 384   # Max patch size for progressive training
    gt_sizes: [160,256,320,320,384,384]  # Patch sizes for progressive training.
    ## ------------------------------------------------------------

    # ### ------- Training on single fixed-patch size 128x128---------
    # mini_batch_sizes: [4]   
    # iters: [300000]
    # gt_size: 128   
    # gt_sizes: [128]
    # ### ------------------------------------------------------------

    dataset_enlarge_ratio: 10
    prefetch_mode: ~

  val:
    name: ValSet
    type: Dataset_MedicalImageMultiseg
    target_mod: t2w
    dataroot: /root/autodl-tmp/data/BraTS2023/test
    io_backend:
      type: disk

# network structures
network_g:
  type: TAFMambaWomapfft_improve_multi
  num_modalities: 4  # 固定为4个模态（T1n/T1c/T2w/T2f）
  out_channels: 4    # 模型固定输出4个模态，通过掩码筛选
  dim: 24
  num_blocks: [2, 3, 3, 4]
  num_refinement_blocks: 4
  mlp_ratio: 2
  bias: False
  dual_pixel_task: True
#dual_pixel_task: False

# path
path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

# training settings
train:
  total_iter: 180000
  warmup_iter: -1 # no warm up
  use_grad_clip: true

  # Split 300k iterations into two cycles. 
  # 1st cycle: fixed 3e-4 LR for 92k iters. 
  # 2nd cycle: cosine annealing (3e-4 to 1e-6) for 208k iters.
  scheduler:
    type: CosineAnnealingRestartCyclicLR
#    periods: [23000, 52000]
    periods: [30000, 150000]
    restart_weights: [1,1]
    eta_mins: [0.0003,0.000001]   
  
  mixing_augs:
    mixup: true
    mixup_beta: 1.2
    use_identity: true

  optim_g:
    type: AdamW
    lr: !!float 3e-4
    weight_decay: !!float 1e-4
    betas: [0.9, 0.999]
    foreach: false
  
  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1
    reduction: mean

# validation settings
val:
  window_size: 8
  val_freq: 1
  save_img: true
  rgb2bgr: true
  use_image: false
  max_minibatch: 4

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false

# logging settings
logger:
  print_freq: 50
  save_checkpoint_freq: 5000
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
